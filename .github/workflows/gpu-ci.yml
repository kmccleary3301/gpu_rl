name: GPU CI

on:
  workflow_dispatch:

concurrency:
  group: gpu-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-gpu:
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Export schemas
        run: python scripts/export_schemas.py

      - name: Run GPU smoke suite on self-hosted runner
        run: python scripts/run_gpu_ci_tests.py --suite smoke
